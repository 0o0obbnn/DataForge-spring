# 审查建议：质量门禁通过 mvn verify 生效（含 test 与 JaCoCo check）
name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run verify (tests + JaCoCo check)
        run: mvn clean verify -B
