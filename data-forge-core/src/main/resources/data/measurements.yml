# 输出格式定义
output_formats:
  VALUE_UNIT:
    name: "数值 单位"
    description: "数值和单位，如：100.50 kg"
    example: "100.50 kg"

  UNIT_VALUE:
    name: "单位 数值"
    description: "单位和数值，如：kg 100.50"
    example: "kg 100.50"

  JSON:
    name: "JSON格式"
    description: "JSON格式输出"
    example: '{"value": 100.50, "unit": "kg", "symbol": "kg"}'

  VERBOSE:
    name: "详细格式"
    description: "包含所有信息的详细格式"
    example: "100.50 千克 (kg) - 重量 - 公制"

# 单位制定义
unit_systems:
  METRIC:
    name: "公制"
    description: "国际公制单位制"

  IMPERIAL:
    name: "英制"
    description: "英制单位制"

  US:
    name: "美制"
    description: "美制单位制"

  SI:
    name: "国际单位制"
    description: "国际单位制（SI）"

  NAUTICAL:
    name: "航海"
    description: "航海单位制"

  AVIATION:
    name: "航空"
    description: "航空单位制"
