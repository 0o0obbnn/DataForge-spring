# 全局配置
settings:
  # 默认国家
  default_country: "CN"

  # 默认输出格式
  default_format: "STANDARD"

  # 默认是否包含分机号
  default_include_extension: false

  # 默认分机号长度
  default_extension_length: 3

# 输出格式定义
output_formats:
  STANDARD:
    name: "标准格式"
    description: "区号-号码"
    example: "010-12345678"

  INTERNATIONAL:
    name: "国际格式"
    description: "+国家码-区号-号码"
    example: "+86-010-12345678"

  COMPACT:
    name: "紧凑格式"
    description: "区号号码（无分隔符）"
    example: "01012345678"

  PARENTHESES:
    name: "括号格式"
    description: "(区号) 号码"
    example: "(010) 12345678"
