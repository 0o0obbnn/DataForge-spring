      - "2024-02-14:春节"
      - "2024-02-15:春节"
      - "2024-02-16:春节"
      - "2024-02-17:春节"
      - "2024-04-04:清明节"
      - "2024-04-05:清明节"
      - "2024-04-06:清明节"
      - "2024-05-01:劳动节"
      - "2024-05-02:劳动节"
      - "2024-05-03:劳动节"
      - "2024-06-10:端午节"
      - "2024-09-15:中秋节"
      - "2024-09-16:中秋节"
      - "2024-09-17:中秋节"
      - "2024-10-01:国庆节"
      - "2024-10-02:国庆节"
      - "2024-10-03:国庆节"
      - "2024-10-04:国庆节"
      - "2024-10-05:国庆节"
      - "2024-10-06:国庆节"
      - "2024-10-07:国庆节"
    trading_days:
      - "MONDAY"
      - "TUESDAY"
      - "WEDNESDAY"
      - "THURSDAY"
      - "FRIDAY"
    description: "中国A股市场"

  # 美股
  US_STOCK:
    name: "美股"
    currency: "USD"
    timezone: "America/New_York"
    sessions:
      regular: ["09:30", "16:00"]
      premarket: ["04:00", "09:30"]
      afterhours: ["16:00", "20:00"]
    holidays:
      - "2024-01-01:New Year's Day"
      - "2024-01-15:Martin Luther King Jr. Day"
      - "2024-02-19:Presidents' Day"
      - "2024-03-29:Good Friday"
      - "2024-05-27:Memorial Day"
      - "2024-06-19:Juneteenth"
      - "2024-07-04:Independence Day"
      - "2024-09-02:Labor Day"
      - "2024-11-28:Thanksgiving Day"
      - "2024-12-25:Christmas Day"
    trading_days:
      - "MONDAY"
      - "TUESDAY"
      - "WEDNESDAY"
      - "THURSDAY"
      - "FRIDAY"
    description: "美国股票市场"

  # 港股
  HK_STOCK:
    name: "港股"
    currency: "HKD"
    timezone: "Asia/Hong_Kong"
    sessions:
      morning: ["09:30", "12:00"]
      afternoon: ["13:00", "16:00"]
    holidays:
      - "2024-01-01:元旦"
      - "2024-02-10:春节"
      - "2024-02-11:春节"
      - "2024-02-12:春节"
      - "2024-02-13:春节"
      - "2024-04-04:清明节"
      - "2024-04-05:清明节"
      - "2024-04-06:清明节"
      - "2024-05-01:劳动节"
      - "2024-05-02:劳动节"
      - "2024-05-03:劳动节"
      - "2024-06-10:端午节"
      - "2024-09-17:中秋节"
      - "2024-10-01:国庆节"
      - "2024-10-02:国庆节"
      - "2024-10-03:国庆节"
      - "2024-10-04:国庆节"
      - "2024-10-05:国庆节"
      - "2024-10-06:国庆节"
      - "2024-10-07:国庆节"
      - "2024-12-25:圣诞节"
      - "2024-12-26:节礼日"
