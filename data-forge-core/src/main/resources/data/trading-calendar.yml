      - "FRIDAY"
    description: "香港股票市场"

  # 欧股
  EU_STOCK:
    name: "欧股"
    currency: "EUR"
    timezone: "Europe/London"
    sessions:
      regular: ["09:00", "17:30"]
    holidays:
      - "2024-01-01:New Year's Day"
      - "2024-04-01:Easter Monday"
      - "2024-05-01:Labour Day"
      - "2024-05-09:Europe Day"
      - "2024-12-25:Christmas Day"
      - "2024-12-26:Boxing Day"
