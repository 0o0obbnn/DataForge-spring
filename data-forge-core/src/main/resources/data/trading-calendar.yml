      - "MONDAY"
      - "TUESDAY"
      - "WEDNESDAY"
      - "THURSDAY"
      - "FRIDAY"
    description: "欧洲股票市场"

# 交易时段类型定义
session_types:
  MORNING:
    name: "上午时段"
    description: "上午交易时段"

  AFTERNOON:
    name: "下午时段"
    description: "下午交易时段"

  FULL:
    name: "全天时段"
    description: "全天交易时段"

  PREMARKET:
    name: "盘前时段"
    description: "盘前交易时段"

  AFTERHOURS:
    name: "盘后时段"
    description: "盘后交易时段"

  REGULAR:
    name: "常规时段"
    description: "常规交易时段"

# 日期类型定义
date_types:
  TRADING_DAY:
    name: "交易日"
    description: "市场交易日"

  NON_TRADING_DAY:
    name: "非交易日"
    description: "市场非交易日"

  HOLIDAY:
    name: "节假日"
    description: "市场节假日"

  ANY:
    name: "任意日期"
    description: "任意日期（交易日或节假日）"

# 输出格式定义
output_formats:
  DATE:
    name: "日期格式"
    description: "yyyy-MM-dd格式"

  DATETIME:
    name: "日期时间格式"
    description: "yyyy-MM-dd HH:mm:ss格式"

  TIMESTAMP:
    name: "时间戳格式"
    description: "yyyy-MM-ddTHH:mm:ss格式"

  VERBOSE:
    name: "详细格式"
    description: "包含星期、市场、交易状态等详细信息"

  CHINESE:
    name: "中文格式"
    description: "中文日期格式（如：2024年01月01日（星期一）[A股] 交易日）"
