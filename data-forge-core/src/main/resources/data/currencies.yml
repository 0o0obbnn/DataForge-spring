# 全局配置
settings:
  # 默认输出类型
  default_output_type: "CODE"

  # 默认金额范围
  default_amount_min: 0.01
  default_amount_max: 10000.00

  # 默认金额格式
  default_format: "FORMATTED"

  # 是否默认只使用常用货币
  default_common_only: true

# 输出类型定义
output_types:
  CODE:
    name: "货币代码"
    description: "ISO 4217货币代码（USD, EUR等）"
    example: "USD"

  SYMBOL:
    name: "货币符号"
    description: "货币符号（$, €, ¥等）"
    example: "$"

  NAME:
    name: "货币名称"
    description: "货币全名（US Dollar等）"
    example: "US Dollar"

  AMOUNT:
    name: "金额"
    description: "随机金额值"
    example: "1234.56"

  FULL:
    name: "完整信息"
    description: "包含所有货币信息"
    example: '{"code":"USD","symbol":"$","name":"US Dollar","amount":"1234.56"}'

# 金额格式定义
amount_formats:
  PLAIN:
    name: "纯数字"
    description: "无格式的数字字符串"
    example: "1234.56"

  FORMATTED:
    name: "格式化"
    description: "根据locale格式化的金额"
    example: "1,234.56"

  SYMBOL:
    name: "带符号"
    description: "包含货币符号"
    example: "$1,234.56"

# 地区分类
regions:
  AMERICAS:
    name: "美洲"
    description: "北美洲和南美洲货币"
  EUROPE:
    name: "欧洲"
    description: "欧洲货币"
  ASIA:
    name: "亚洲"
    description: "亚洲货币"
  AFRICA:
    name: "非洲"
    description: "非洲货币"
  OCEANIA:
    name: "大洋洲"
    description: "大洋洲货币"
  DIGITAL:
    name: "数字货币"
    description: "加密货币和其他数字货币"
