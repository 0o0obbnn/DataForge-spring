# 手机号码生成器配置文件
# 支持多运营商、多地区、多格式的手机号码生成

# 运营商号段配置
operators:
  # 中国移动
  mobile:
    name: "中国移动"
    prefixes:
      - "134"
      - "135"
      - "136"
      - "137"
      - "138"
      - "139"
      - "147"
      - "148"
      - "150"
      - "151"
      - "152"
      - "157"
      - "158"
      - "159"
      - "172"
      - "178"
      - "182"
      - "183"
      - "184"
      - "187"
      - "188"
      - "195"
      - "197"
      - "198"
    weight: 40
    description: "中国移动号段"

  # 中国联通
  unicom:
    name: "中国联通"
    prefixes:
      - "130"
      - "131"
      - "132"
      - "145"
      - "146"
      - "155"
      - "156"
      - "166"
      - "167"
      - "171"
      - "175"
      - "176"
      - "185"
      - "186"
      - "196"
    weight: 30
    description: "中国联通号段"

  # 中国电信
  telecom:
    name: "中国电信"
    prefixes:
      - "133"
      - "149"
      - "153"
      - "173"
      - "174"
      - "177"
      - "180"
      - "181"
      - "189"
      - "191"
      - "193"
      - "199"
    weight: 30
    description: "中国电信号段"

  # 虚拟运营商
  virtual:
    name: "虚拟运营商"
    prefixes:
      - "162"
      - "165"
      - "167"
      - "170"
      - "171"
    weight: 5
    description: "虚拟运营商号段"

# 地区配置
regions:
  # 中国大陆
  CN:
    name: "中国大陆"
    length: 11
    format: "###########"
    description: "中国大陆手机号码格式"

  # 美国
  US:
    name: "美国"
    length: 10
    format: "(###) ###-####"
    description: "美国手机号码格式"

  # 英国
  UK:
    name: "英国"
    length: 11
    format: "#### #######"
    description: "英国手机号码格式"

  # 日本
  JP:
    name: "日本"
    length: 11
    format: "###-####-####"
    description: "日本手机号码格式"

  # 韩国
  KR:
    name: "韩国"
    length: 11
    format: "###-####-####"
    description: "韩国手机号码格式"

# 无效前缀配置（用于生成无效号码）
invalid_prefixes:
  - "100"
  - "101"
  - "102"
  - "110"
  - "111"
  - "120"
  - "121"
  - "122"
  - "123"
  - "124"
  - "125"
  - "126"
  - "127"
  - "128"
  - "129"
