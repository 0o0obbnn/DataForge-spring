# 全局配置
settings:
  # 字符集配置
  characters:
    # 车牌字符集（排除I和O，避免与数字混淆）
    plate_chars: "ABCDEFGHJKLMNPQRSTUVWXYZ0123456789"
    # 可选字符（包含I和O）
    optional_chars: "IO"

  # 新能源车配置
  new_energy:
    # 新能源车牌前缀
    prefixes: ["D", "F"]
    # 新能源车牌号码长度（不包含前缀）
    number_length: 5

  # 传统燃油车配置
  traditional:
    # 传统车牌号码长度
    number_length: 5

  # 城市代码字母全集（用于fallback）
  city_codes: ["A", "B", "C", "D", "E", "F", "G", "H", "J", "K", "L", "M", "N", "P", "Q", "R", "S", "T", "U", "V", "W", "X", "Y", "Z"]

# 输出格式定义
output_formats:
  STANDARD:
    name: "标准格式"
    description: "省份简称+城市代码+号码"
    example: "京A12345"

  FULL:
    name: "完整格式"
    description: "包含国家代码"
    example: "CN.京A12345"

  JSON:
    name: "JSON格式"
    description: "结构化输出"
    example: '{"country": "CN", "province": "京", "city": "A", "number": "12345", "type": "traditional"}'
