spring:
  application:
    name: data-forge-web-test
  main:
    allow-bean-definition-overriding: true
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisReactiveAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration

  # Database configuration for tests
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  # JPA/Hibernate configuration for tests
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        '[format_sql]': true

  # Disable Flyway for tests
  flyway:
    enabled: false

  # Disable Redis for tests - 使用嵌入式配置
  data:
    redis:

      host: localhost
      port: 6379

  # Cache configuration
  cache:
    type: simple

# JWT configuration for tests
app:
  jwt:
    secret: test-secret-key-for-testing-only-not-for-production
    expiration: 3600000
    refresh-expiration: 604800000

# DataForge configuration for tests
dataforge:
  cache:
    enabled: false
  performance:
    enabled: true
  security:
    max-record-count: 10000
    max-thread-count: 4
    max-field-count: 100
    max-config-size-mb: 10
    enable-resource-monitoring: false

management:
  health:
    redis:
      enabled: false

